name: Flutter iOS IPA Build

on:
  push:
    branches:
      - main  # Triggers the build whenever you push code to main
  workflow_dispatch: # Allows you to trigger the build manually from GitHub

jobs:
  build:
    name: Compile iOS IPA
    runs-on: macos-latest # Uses GitHub's cloud-hosted Mac servers

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Matches your project's current stable SDK profile

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Payload Directories
        # Compiles the workspace structure without requiring paid provisioning profiles
        run: flutter build ios --release --no-codesign

      - name: Package App into IPA Container
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r FlutterInventory.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iPad-Installable-IPA
          path: FlutterInventory.ipa